# Example Apache SSL VirtualHost snippet for XAMPP
<IfModule ssl_module>
    <VirtualHost _default_:443>
        DocumentRoot "C:/xampp/htdocs/knbts_secure_system"
        ServerName localhost:443

        SSLEngine on
        SSLCertificateFile "C:/xampp/apache/certs/server.crt"
        SSLCertificateKeyFile "C:/xampp/apache/certs/server.key"

        <Directory "C:/xampp/htdocs/knbts_secure_system">
            Require all granted
            AllowOverride All
        </Directory>

        # Log locations (adjust as needed)
        ErrorLog "logs/ssl_error.log"
        TransferLog "logs/ssl_access.log"
    </VirtualHost>
</IfModule>
